services:
  - type: web
    name: proengine-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: standard
    region: ohio
    envVars:
      - key: PORT
        value: 8000
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /
